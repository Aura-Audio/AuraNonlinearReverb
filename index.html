<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonlinear Reverb (WASM-Ready)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Nonlinear Reverb (WASM-Ready)</h1>
    <p>Adds harmonics + reverb modulation. Creates shimmering, infinite, or chaotic textures.</p>

    <div class="controls">
      <div class="bypass">
        <button id="bypassBtn">Bypass Reverb</button>
        <span id="status">Press "Allow" to enable mic access.</span>
      </div>

      <div class="slider-container">
        <div class="slider">
          <label for="decay">Decay (s):</label>
          <input type="range" id="decay" min="0.1" max="10" step="0.1" value="3">
          <span class="value" id="decayValue">3.0</span>
        </div>
        <div class="slider">
          <label for="diffusion">Diffusion:</label>
          <input type="range" id="diffusion" min="0" max="1" step="0.01" value="0.7">
          <span class="value" id="diffusionValue">0.70</span>
        </div>
        <div class="slider">
          <label for="modDepth">Mod Depth:</label>
          <input type="range" id="modDepth" min="0" max="1" step="0.01" value="0.3">
          <span class="value" id="modDepthValue">0.30</span>
        </div>
        <div class="slider">
          <label for="modFreq">Mod Freq (Hz):</label>
          <input type="range" id="modFreq" min="0.1" max="10" step="0.1" value="1">
          <span class="value" id="modFreqValue">1.0</span>
        </div>
        <div class="slider">
          <label for="tone">Tone (HPF):</label>
          <input type="range" id="tone" min="20" max="20000" step="10" value="1000">
          <span class="value" id="toneValue">1000</span>
        </div>
        <div class="slider">
          <label for="feedback">Feedback:</label>
          <input type="range" id="feedback" min="0" max="0.99" step="0.01" value="0.5">
          <span class="value" id="feedbackValue">0.50</span>
        </div>
        <div class="slider">
          <label for="nonlinearity">Nonlinearity:</label>
          <input type="range" id="nonlinearity" min="0" max="1" step="0.01" value="0.2">
          <span class="value" id="nonlinearityValue">0.20</span>
        </div>
      </div>

      <div class="presets">
        <button class="preset" data-preset="shimmer">Shimmer</button>
        <button class="preset" data-preset="chaotic">Chaotic</button>
        <button class="preset" data-preset="infinite">Infinite</button>
        <button class="preset" data-preset="subtle">Subtle</button>
        <button class="preset" data-preset="dronescape">Dronescape</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
